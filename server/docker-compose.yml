services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiwb-server
    env_file:
      - ./.env
    expose:
      - "5000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: aiwb-nginx
    depends_on:
      - server
    ports:
      - "80:80"
    volumes:
      - type: bind
        source: ./nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped