server {
  listen 80;
  server_name _;

  # CORS is handled by Express (cors middleware). Nginx only proxies; it does not
  # add Access-Control-* headers here (duplicates would break the browser).
  # If you see a "CORS" error with status 502/504, nginx could not reach the API.

  location /api/ {
    proxy_pass http://server:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Origin $http_origin;
  }

  location /health {
    proxy_pass http://server:5000/api/health;
  }

  location / {
    return 200 'Nginx is up';
    add_header Content-Type text/plain;
  }
}